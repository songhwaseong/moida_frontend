name: CD

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '.github/workflows/rollback.yml'
      - 'docs/**'
      - '*.md'

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  ECR_REPOSITORY: moida-frontend
  IMAGE_NAME: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/moida-frontend
  CONTAINER_NAME: moida-frontend
  STATE_DIR: $HOME/.moida-deploy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: AWS 인증 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Amazon ECR 로그인
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 이미지 빌드 & 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true          
          build-args: |
            VITE_KAKAO_CLIENT_ID=${{ secrets.VITE_KAKAO_CLIENT_ID }}
            VITE_KAKAO_REDIRECT_URI=${{ secrets.VITE_KAKAO_REDIRECT_URI }}
            VITE_NAVER_CLIENT_ID=${{ secrets.VITE_NAVER_CLIENT_ID }}
            VITE_NAVER_REDIRECT_URI=${{ secrets.VITE_NAVER_REDIRECT_URI }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            VITE_GOOGLE_REDIRECT_URI=${{ secrets.VITE_GOOGLE_REDIRECT_URI }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  deploy-ec2-1:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: 1번 EC2 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST_1 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            IMAGE="${{ env.IMAGE_NAME }}:${{ github.sha }}"
            STATE_DIR="$HOME/.moida-deploy"
            CURRENT_FILE="$STATE_DIR/${{ env.CONTAINER_NAME }}.current"
            PREVIOUS_FILE="$STATE_DIR/${{ env.CONTAINER_NAME }}.previous"
            mkdir -p "$STATE_DIR"

            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            docker pull "$IMAGE"

            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true

            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p 80:80 \
              --link moida-backend:moida-backend \
              "$IMAGE"

            sleep 5
            test -n "$(docker ps -q --filter "name=^/${{ env.CONTAINER_NAME }}$" --filter "status=running")"

            if [ -s "$CURRENT_FILE" ]; then
              cp "$CURRENT_FILE" "$PREVIOUS_FILE"
            fi
            echo "$IMAGE" > "$CURRENT_FILE"
            docker image prune -f

  deploy-ec2-2:
    runs-on: ubuntu-latest
    needs: deploy-ec2-1

    steps:
      - name: 2번 EC2 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST_2 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            IMAGE="${{ env.IMAGE_NAME }}:${{ github.sha }}"
            STATE_DIR="$HOME/.moida-deploy"
            CURRENT_FILE="$STATE_DIR/${{ env.CONTAINER_NAME }}.current"
            PREVIOUS_FILE="$STATE_DIR/${{ env.CONTAINER_NAME }}.previous"
            mkdir -p "$STATE_DIR"

            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            docker pull "$IMAGE"

            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true

            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p 80:80 \
              --link moida-backend:moida-backend \
              "$IMAGE"

            sleep 5
            test -n "$(docker ps -q --filter "name=^/${{ env.CONTAINER_NAME }}$" --filter "status=running")"

            if [ -s "$CURRENT_FILE" ]; then
              cp "$CURRENT_FILE" "$PREVIOUS_FILE"
            fi
            echo "$IMAGE" > "$CURRENT_FILE"
            docker image prune -f

